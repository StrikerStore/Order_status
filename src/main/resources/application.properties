# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Logging Configuration
# Root defaults to INFO; some hosts set LOG_LEVEL / logging.level.root to ERROR — app logs still use logback-spring.xml.
logging.level.root=INFO
logging.level.com.shipway.ordertracking=INFO
logging.level.org.springframework.web=INFO

# Log File Configuration
logging.file.name=logs/application.log
logging.file.max-size=5MB
logging.file.max-history=5


# order_tracking is mapped by JPA entity com.shipway.ordertracking.entity.OrderTracking (ddl-auto=validate).
# labels: JDBC reads awb for fulfillments — table `labels`, columns id, account_code, order_id, awb.

# Preview API: bulk GraphQL orders(query=...) per Shopify account (pagination up to max).
shopify.preview.bulk-orders-query=fulfillment_status:unfulfilled
# Include partially fulfilled too (closer to old per-order check): fulfillment_status:unfulfilled OR fulfillment_status:partial
shopify.preview.bulk-orders-max=5000

