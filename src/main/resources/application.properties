# Thymeleaf (internal UIs)
spring.thymeleaf.cache=false
# Read-only browser for customer_message_tracking: GET /ui/message-tracking
# Home (links to UIs + Swagger): GET /
# Fulfillment UI table: only list orders whose Shopify createdAt is on or after this date (ISO yyyy-MM-dd, start of day UTC).
